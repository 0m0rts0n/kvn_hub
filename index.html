<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kvn_hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="panel">
      <p class="eyebrow">GitHub Pages</p>
      <h1>Чтение данных из <code>data.txt</code></h1>
      <p class="lead">
        Эта страница загружает текстовый файл рядом с сайтом и выводит его содержимое ниже.
      </p>
      <div class="actions">
        <button id="reloadButton" type="button">Обновить</button>
        <span id="statusText" class="status">Загрузка...</span>
      </div>
      <pre id="output" class="output" aria-live="polite"></pre>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
